name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore DiskSpaceInspector.sln

      - name: Build
        run: dotnet build DiskSpaceInspector.sln --no-restore -m:1 -v:minimal

      - name: Test
        run: dotnet test tests\DiskSpaceInspector.Tests\DiskSpaceInspector.Tests.csproj --no-restore -m:1 -v:minimal

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Package release artifacts
        shell: pwsh
        run: |
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          .\scripts\package-release.ps1 -Version 1.1.0

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: disk-space-inspector-release
          path: artifacts/release/*
